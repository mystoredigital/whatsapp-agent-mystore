services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: whatsapp-agent-mystore:latest
    container_name: whatsapp-agent-mystore
    restart: unless-stopped
    networks:
      - dokploy-network
    volumes:
      - ../files/data:/app/data
      - ../files/credentials:/app/credentials
    environment:
      PORT: ${PORT}
      DASHBOARD_USER: ${DASHBOARD_USER}
      DASHBOARD_PASS: ${DASHBOARD_PASS}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME}
      GOOGLE_SERVICE_ACCOUNT_FILE: ${GOOGLE_SERVICE_ACCOUNT_FILE}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID}
      TIMEZONE: ${TIMEZONE}
      BUSINESS_NAME: ${BUSINESS_NAME}
      BUSINESS_DESCRIPTION: ${BUSINESS_DESCRIPTION}
      GHL_CLIENT_ID: ${GHL_CLIENT_ID}
      GHL_CLIENT_SECRET: ${GHL_CLIENT_SECRET}
      GHL_SHARED_SECRET: ${GHL_SHARED_SECRET}
      GHL_CONVERSATION_PROVIDER_ID: ${GHL_CONVERSATION_PROVIDER_ID}
      GHL_REDIRECT_URI: ${GHL_REDIRECT_URI}
      GHL_WEBHOOK_PUBLIC_KEY: ${GHL_WEBHOOK_PUBLIC_KEY}
    labels:
      - traefik.enable=true
      - traefik.http.routers.whatsapp-agent-mystore.entrypoints=websecure
      - traefik.http.routers.whatsapp-agent-mystore.rule=Host(`wa.mystoredigital.cloud`)
      - traefik.http.routers.whatsapp-agent-mystore.tls.certresolver=letsencrypt
      - traefik.http.services.whatsapp-agent-mystore.loadbalancer.server.port=3000

networks:
  dokploy-network:
    external: true
